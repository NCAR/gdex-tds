replicaCount: 3
revisionHistoryCount: 9
restartedAt: "2026-06-09T01:20:23Z"

backup:
  enabled: true
  prefix: tds-data
  logs:
    enabled: true
    prefix: tds-tomcat-logs
  
webapp:
  name: rda-tds
  group: rda-tds
  path: /
  # SSL/TLS encryption for the user browser to Ingress connection
  tls:
    # Fully Qualified Domain Name (e.g.: <app-name>.k8s.ucar.edu)
    fqdn: tds.k8s.ucar.edu       
    fqdn2: tds.gdex.ucar.edu
    fqdn3: thredds.rda.ucar.edu
    # Kubernetes Secret that contains the TLS certificate
    secretName: incommon-cert-tds
  container: 
    load_balance: ewma  # Enable weighted load balancing to avoid traffic concentrate on a subset of pods 
    image: docker.io/potatofever/rda-tds:sha-ce422b7
    port: 8080
    memory: 64G
    cpu: 5
    ephemeralStorageLimit: 5Gi
    responseTimeout: 180
    maxUploadSize: 30m
    limit_connections: 150  # Increased for concurrent requests - global limit
    limit_rps: 150           # Increased for page load bursts - global limit
 
    env:
      THREDDS_XMX_SIZE: 48G
      THREDDS_XMS_SIZE: 16G
  logs: 
    name: rda-logs
    image: docker.io/potatofever/rda-logs:sha-3f40dca
    port: 8080
    memory: 2G
    cpu: 1
    ephemeralStorageLimit: 1Gi
  tdm:
    name: gdex-tdm
    image: docker.io/potatofever/gdex-tdm:sha-00c57b0
    port: 8080
    memory: 6G
    cpu: 2
    ephemeralStorageLimit: 2Gi
    env:
      TDM_XMX_SIZE: "5G"
      TDM_XMS_SIZE: "2G"
  volume1:
    name: campaign
    server: gladedm1.ucar.edu
    path: /glade/campaign/collections/gdex/
    readOnly: true
  volume:
    fs:
      name: tds-persist
      size: 1Ti
      mountPath: /data/TDSIndexFiles/data/rda/data # /tmp2/TDSIndexFiles # /data/TDSIndexFiles
  volume2:
    fs:
      name: logs-persist
      size: 100Gi
      mountPath: /usr/local/tomcat/logs

