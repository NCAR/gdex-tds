apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.webapp.name }}-fileserver-block
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
  annotations:
    # Allow only localhost, effectively blocking external /thredds/fileServer/ access with 403.
    nginx.ingress.kubernetes.io/whitelist-source-range: "127.0.0.1/32"
spec:
  ingressClassName: nginx-external
  rules:
  - host: {{ .Values.webapp.tls.fqdn }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
  - host: {{ .Values.webapp.tls.fqdn2 }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
  - host: {{ .Values.webapp.tls.fqdn3 }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
