apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.webapp.name }}-fileserver-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.webapp.name }}-fileserver-deny
    group: {{ .Values.webapp.group }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.webapp.name }}-fileserver-deny
  template:
    metadata:
      labels:
        app: {{ .Values.webapp.name }}-fileserver-deny
    spec:
      containers:
      - name: deny
        image: nginx:alpine
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c"]
        args:
        - |
          cat >/etc/nginx/conf.d/default.conf <<'EOF'
          server {
            listen 80;
            location / {
              return 403;
            }
          }
          EOF
          exec nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.webapp.name }}-fileserver-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.webapp.name }}-fileserver-deny
    group: {{ .Values.webapp.group }}
spec:
  selector:
    app: {{ .Values.webapp.name }}-fileserver-deny
  ports:
  - name: http
    port: 80
    targetPort: 80
