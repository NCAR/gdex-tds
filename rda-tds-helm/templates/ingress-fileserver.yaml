apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.webapp.name }}-fileserver
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
  annotations:
    cert-manager.io/cluster-issuer: "incommon"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "{{ .Values.webapp.container.responseTimeout }}"
    nginx.ingress.kubernetes.io/load-balance: "{{ .Values.webapp.container.load_balance }}"
    # Use the real client IP (from X-Forwarded-For) for rate limiting, not the node IP
    # Requires externalTrafficPolicy: Local and use-forwarded-headers: true on the ingress controller
    nginx.ingress.kubernetes.io/real-ip-header: "X-Forwarded-For"
    nginx.ingress.kubernetes.io/forwarded-for-header: "X-Forwarded-For"
    # The Bouncer: reject excess requests before they hit the pod (limit_req)
    nginx.ingress.kubernetes.io/limit-rps: "{{ .Values.webapp.container.fileServer.limit_rps }}"
    # The Occupancy Limit: cap simultaneous downloads per IP (limit_conn)
    nginx.ingress.kubernetes.io/limit-connections: "{{ .Values.webapp.container.fileServer.limit_connections }}"
    # The Slow Drip: bandwidth throttle via configuration-snippet (limit_rate)
    # Requires allow-snippet-annotations: "true" in the NGINX Ingress controller ConfigMap
    nginx.ingress.kubernetes.io/configuration-snippet: |
      limit_rate_after {{ .Values.webapp.container.fileServer.limit_rate_after }};
      limit_rate {{ .Values.webapp.container.fileServer.limit_rate }};
spec:
  ingressClassName: nginx-external
  tls:
    - hosts:
      - {{ .Values.webapp.tls.fqdn }}
      - {{ .Values.webapp.tls.fqdn2 }}
      - {{ .Values.webapp.tls.fqdn3 }}
      secretName: {{ .Values.webapp.tls.secretName }}
  rules:
  - host: {{ .Values.webapp.tls.fqdn }}
    http:
      paths:
      - path: /thredds/fileServer/
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
  - host: {{ .Values.webapp.tls.fqdn2 }}
    http:
      paths:
      - path: /thredds/fileServer/
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
  - host: {{ .Values.webapp.tls.fqdn3 }}
    http:
      paths:
      - path: /thredds/fileServer/
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}
            port:
              number: {{ .Values.webapp.container.port }}
