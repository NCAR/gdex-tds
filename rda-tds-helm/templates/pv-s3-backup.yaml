{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.webapp.name }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.webapp.name }}
    group: {{ .Values.webapp.group }}
spec:
  schedule: {{ .Values.backup.schedule | default "17 4 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app: {{ .Values.webapp.name }}-backup
            group: {{ .Values.webapp.group }}
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.backup.runAsUser | default 1000 }}
            runAsGroup: {{ .Values.backup.runAsUser | default 1000 }}
            fsGroup: {{ .Values.backup.runAsUser | default 1000 }}
          containers:
            - name: rclone
              image: {{ .Values.backup.image | default "docker.io/rclone/rclone:1.74" | quote }}
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u

                  export RCLONE_CONFIG=/tmp/rclone.conf
                  cat > "${RCLONE_CONFIG}" <<EOF
                  [dest]
                  type = s3
                  provider = Other
                  endpoint = ${S3_ENDPOINT}
                  force_path_style = true
                  env_auth = true
                  EOF

                  RUN_ID="$(date -u +%Y-%m-%dT%H%M%SZ)"
                  LOG="/tmp/rclone-${RUN_ID}.log"
                  SKIPPED="/tmp/skipped-${RUN_ID}.txt"
                  REPORT_KEY="${DEST_PREFIX}/_reports/${RUN_ID}.txt"

                  echo "Backup run ${RUN_ID} starting"
                  echo "Source: ${SOURCE_DIR}"
                  echo "Dest:   dest:${DEST_BUCKET}/${DEST_PREFIX}"
                  echo "Report: dest:${DEST_BUCKET}/${REPORT_KEY}"

                  # TDS-specific exclude list. Hardcoded rather than
                  # exposed via values because these are properties of
                  # the TDS application (caches, scratch, atomic-write
                  # tempfiles) not knobs anyone should be tuning.
                  rclone copy \
                    --links \
                    --exclude 'tds-overflow/**' \
                    --exclude 'tds-temp-cache-cdm/**' \
                    --exclude 'tds-temp-cache-ncss/**' \
                    --exclude 'tds-temp-cache-wcs/**' \
                    --exclude 'tds-temp-cache-edal-java/**' \
                    --exclude 'tds-temp-logs/**' \
                    --exclude 'tdm-logs/**' \
                    --exclude '*.tmp' \
                    --log-level "${RCLONE_LOG_LEVEL}" \
                    --log-file "${LOG}" \
                    --transfers "${RCLONE_TRANSFERS}" \
                    --checkers "${RCLONE_CHECKERS}" \
                    --s3-chunk-size "${RCLONE_CHUNK_SIZE}" \
                    --s3-upload-concurrency "${RCLONE_UPLOAD_CONCURRENCY}" \
                    --stats 1m \
                    --stats-one-line \
                    --metadata \
                    "${SOURCE_DIR}" \
                    "dest:${DEST_BUCKET}/${DEST_PREFIX}"
                  RC=$?

                  # Permission-denied paths
                  grep 'ERROR : ' "${LOG}" 2>/dev/null \
                    | grep 'permission denied' \
                    | sed -E 's@^.*open ([^:]+): permission denied.*$@\1@' \
                    | sort -u > "${SKIPPED}.perms" || true

                  # Broken symlinks
                  grep -E 'NOTICE.*Can.t follow symlink' "${LOG}" 2>/dev/null \
                    | sed -E 's@^[0-9/]+ [0-9:]+ NOTICE *: ([^:]+):.*$@\1@' \
                    | sort -u > "${SKIPPED}.symlinks" || true

                  # Race conditions (file vanished between list and read).
                  # Common on TDS because TDM is actively writing index
                  # files. *.tmp is already excluded; this catches any
                  # other transient writes that slip through.
                  grep 'ERROR : ' "${LOG}" 2>/dev/null \
                    | grep 'no such file or directory' \
                    | sed -E 's@^.*ERROR : ([^:]+):.*$@\1@' \
                    | sort -u > "${SKIPPED}.races" || true

                  cat "${SKIPPED}.perms" "${SKIPPED}.symlinks" "${SKIPPED}.races" \
                    | sort -u > "${SKIPPED}"
                  PERMS_COUNT=$(wc -l < "${SKIPPED}.perms" 2>/dev/null || echo 0)
                  SYMLINK_COUNT=$(wc -l < "${SKIPPED}.symlinks" 2>/dev/null || echo 0)
                  RACE_COUNT=$(wc -l < "${SKIPPED}.races" 2>/dev/null || echo 0)
                  SKIPPED_COUNT=$(wc -l < "${SKIPPED}" 2>/dev/null || echo 0)

                  # Real errors = ERROR lines that aren't one of the
                  # tolerated categories above and aren't rclone's
                  # standard "summary" lines that always appear when
                  # anything failed.
                  OTHER_ERRORS=$(grep 'ERROR : ' "${LOG}" 2>/dev/null \
                    | grep -v 'permission denied' \
                    | grep -v 'no such file or directory' \
                    | grep -v "Can't retry any of the errors" \
                    | grep -v 'Failed to copy with' \
                    | grep -v 'Failed to copy: failed to open' \
                    | wc -l)

                  {
                    echo "Backup run:        ${RUN_ID}"
                    echo "Source:            ${SOURCE_DIR}"
                    echo "Destination:       dest:${DEST_BUCKET}/${DEST_PREFIX}"
                    echo "rclone exit code:  ${RC}"
                    echo "Permission denied: ${PERMS_COUNT}"
                    echo "Broken symlinks:   ${SYMLINK_COUNT}"
                    echo "Race conditions:   ${RACE_COUNT}"
                    echo "Other errors:      ${OTHER_ERRORS}"
                    echo
                    echo "=== Final rclone summary ==="
                    tail -10 "${LOG}" 2>/dev/null || echo "(no log)"
                    echo
                    echo "=== Permission-denied paths ==="
                    cat "${SKIPPED}.perms" 2>/dev/null || echo "(none)"
                    echo
                    echo "=== Broken symlinks ==="
                    cat "${SKIPPED}.symlinks" 2>/dev/null || echo "(none)"
                    echo
                    echo "=== Race conditions ==="
                    cat "${SKIPPED}.races" 2>/dev/null || echo "(none)"
                  } | rclone rcat "dest:${DEST_BUCKET}/${REPORT_KEY}" || \
                      echo "WARNING: failed to upload report"

                  echo
                  echo "Backup run ${RUN_ID} finished"
                  echo "  rclone exit:       ${RC}"
                  echo "  permission denied: ${PERMS_COUNT}"
                  echo "  broken symlinks:   ${SYMLINK_COUNT}"
                  echo "  race conditions:   ${RACE_COUNT}"
                  echo "  other errors:      ${OTHER_ERRORS}"

                  if [ "${RC}" = "0" ]; then
                    exit 0
                  elif [ "${RC}" = "6" ] && [ "${OTHER_ERRORS}" = "0" ]; then
                    echo "Tolerating ${SKIPPED_COUNT} expected errors; see report."
                    exit 0
                  else
                    echo "Failing job: rclone=${RC} other_errors=${OTHER_ERRORS}"
                    exit 1
                  fi
              env:
                - name: SOURCE_DIR
                  value: {{ .Values.webapp.volume.fs.mountPath | quote }}
                - name: DEST_BUCKET
                  value: {{ .Values.backup.bucket | default "gdex" | quote }}
                - name: DEST_PREFIX
                  value: {{ .Values.backup.prefix | quote }}
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.endpoint | default "https://boreas.hpc.ucar.edu:6443" | quote }}
                - name: RCLONE_LOG_LEVEL
                  value: {{ .Values.backup.logLevel | default "NOTICE" | quote }}
                - name: RCLONE_TRANSFERS
                  value: {{ (.Values.backup.rclone | default dict).transfers | default 8 | quote }}
                - name: RCLONE_CHECKERS
                  value: {{ (.Values.backup.rclone | default dict).checkers | default 16 | quote }}
                - name: RCLONE_CHUNK_SIZE
                  value: {{ printf "%dM" (int ((.Values.backup.rclone | default dict).chunkSizeMB | default 64)) | quote }}
                - name: RCLONE_UPLOAD_CONCURRENCY
                  value: {{ (.Values.backup.rclone | default dict).uploadConcurrency | default 4 | quote }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.credentialsSecret | default "backup-s3-creds" | quote }}
                      key: access_key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.credentialsSecret | default "backup-s3-creds" | quote }}
                      key: secret_key
              resources:
                {{- if .Values.backup.resources }}
                {{- toYaml .Values.backup.resources | nindent 16 }}
                {{- else }}
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "2"
                  memory: "6Gi"
                {{- end }}
              volumeMounts:
                - name: {{ .Values.webapp.volume.fs.name }}
                  mountPath: {{ .Values.webapp.volume.fs.mountPath }}
                  readOnly: true
          volumes:
            - name: {{ .Values.webapp.volume.fs.name }}
              persistentVolumeClaim:
                claimName: {{ .Values.webapp.volume.fs.name }}
                readOnly: true
{{- end }}
