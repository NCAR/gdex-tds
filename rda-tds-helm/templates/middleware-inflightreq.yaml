apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.webapp.name }}-inflightreq
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
spec:
  inFlightReq:
    amount: {{ .Values.webapp.container.limit_connections }}
    sourceCriterion:
      ipStrategy:
        depth: 1
