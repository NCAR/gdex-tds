apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.webapp.name }}-fileserver-block
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
spec:
  ingressClassName: nginx-external
  rules:
  - host: {{ .Values.webapp.tls.fqdn }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}-deny-backend
            port:
              number: 80
  - host: {{ .Values.webapp.tls.fqdn2 }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}-deny-backend
            port:
              number: 80
  - host: {{ .Values.webapp.tls.fqdn3 }}
    http:
      paths:
      - path: /thredds/fileServer
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.webapp.name }}-deny-backend
            port:
              number: 80
