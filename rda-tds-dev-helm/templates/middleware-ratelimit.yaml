apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.webapp.name }}-ratelimit
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
spec:
  rateLimit:
    average: {{ .Values.webapp.container.limit_rps }}
    burst: {{ .Values.webapp.container.limit_rps_burst }}
    sourceCriterion:
      ipStrategy:
        depth: 1
